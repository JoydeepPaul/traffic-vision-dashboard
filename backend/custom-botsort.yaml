# BoTSORT tracker configuration for TrafficVision AI
# Optimized for vehicle tracking with perspective correction

tracker_type: botsort

# Detection thresholds
track_high_thresh: 0.5      # High confidence threshold for new tracks
track_low_thresh: 0.1       # Low confidence threshold for track continuation
new_track_thresh: 0.6       # Threshold for creating new tracks
match_thresh: 0.8           # IOU matching threshold

# Track management
track_buffer: 30            # Frames to keep lost tracks before deletion
proximity_thresh: 0.5       # Spatial proximity threshold
appearance_thresh: 0.25     # ReID appearance similarity threshold
fuse_score: True            # Fuse detection confidence with track score

# Motion model (Kalman filter)
gmc_method: sparseOptFlow   # Global motion compensation: sparseOptFlow, orb, ecc, none
with_reid: False            # Disable ReID for faster processing (use appearance_thresh instead)

# Camera motion compensation
cmc_method: sparseOptFlow   # Camera motion compensation method
